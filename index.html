<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notion Chart Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --bg: #0B0D12;
    --panel: #12151C;
    --panel2: #171B24;
    --line: #1F2430;
    --text: #E7E9EE;
    --muted: #7A8091;
    --accent: #D4A24C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    width: 100%;
    height: 100%;
    overflow: hidden;
  }

  /* ==== حاوية الشارت بملء الشاشة ==== */
  .chart-wrap {
    position: fixed;
    inset: 0;
    padding: 18px 22px;
    display: flex;
    flex-direction: column;
  }

  .chart-panel {
    flex: 1;
    position: relative;
    min-height: 0;
  }

  #status {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 13px;
    text-align: center; padding: 20px;
  }

  canvas { width: 100% !important; height: 100% !important; }

  /* ==== منطقة الهوفر لإظهار زر الإعدادات ==== */
  .hover-zone {
    position: fixed;
    top: 0; left: 0;
    width: 90px; height: 90px;
    z-index: 50;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    padding: 12px;
  }

  .settings-btn {
    width: 34px; height: 34px;
    border-radius: 9px;
    background: var(--panel);
    border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    opacity: 0;
    transform: translateY(-6px);
    transition: opacity 0.2s ease, transform 0.2s ease;
  }

  .hover-zone:hover .settings-btn,
  .settings-btn.force-visible {
    opacity: 1;
    transform: translateY(0);
  }

  .settings-btn svg { width: 17px; height: 17px; stroke: var(--muted); }
  .settings-btn:hover svg { stroke: var(--accent); }

  /* ==== لوحة الإعدادات (Overlay) ==== */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(6,7,10,0.55);
    display: none;
    align-items: flex-start;
    justify-content: flex-start;
    z-index: 100;
    padding: 20px;
  }

  .overlay.open { display: flex; }

  .settings-panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px;
    width: 340px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
  }

  .settings-header {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 1px solid var(--line); padding-bottom: 10px;
  }

  .settings-header h2 { font-size: 14px; font-weight: 600; }

  .close-btn {
    width: 26px; height: 26px; border-radius: 7px;
    background: var(--panel2); border: 1px solid var(--line);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .close-btn svg { width: 13px; height: 13px; stroke: var(--muted); }
  .close-btn:hover svg { stroke: var(--text); }

  .field { display: flex; flex-direction: column; gap: 5px; }

  label {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.05em;
    color: var(--muted); text-transform: uppercase;
  }

  input, select {
    background: var(--panel2); border: 1px solid var(--line); color: var(--text);
    padding: 8px 9px; border-radius: 7px; font-family: 'Inter', sans-serif; font-size: 12.5px;
    outline: none; width: 100%;
  }

  input:focus, select:focus { border-color: var(--accent); }

  button.primary {
    background: var(--accent); color: #12151C; border: none; padding: 9px 12px;
    border-radius: 7px; font-weight: 600; font-size: 12.5px; cursor: pointer;
    font-family: 'Inter', sans-serif;
  }
  button.primary:hover { filter: brightness(1.08); }

  .hint { font-size: 10.5px; color: var(--muted); line-height: 1.5; }

  .divider { height: 1px; background: var(--line); margin: 2px 0; }
</style>
</head>
<body>

  <!-- ==== الشارت (كل ما يظهر افتراضياً) ==== -->
  <div class="chart-wrap">
    <div class="chart-panel">
      <div id="status">جاري التحميل...</div>
      <canvas id="chartCanvas"></canvas>
    </div>
  </div>

  <!-- ==== أيقونة الإعدادات (تظهر عند تمرير الماوس أعلى يمين الصفحة) ==== -->
  <div class="hover-zone">
    <div class="settings-btn" id="settingsBtn" title="الإعدادات">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"></circle>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
      </svg>
    </div>
  </div>

  <!-- ==== لوحة الإعدادات ==== -->
  <div class="overlay" id="overlay">
    <div class="settings-panel">
      <div class="settings-header">
        <h2>إعدادات الشارت</h2>
        <div class="close-btn" id="closeBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </div>
      </div>

      <div class="field">
        <label>Web App URL</label>
        <input id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec">
      </div>
      <button class="primary" id="connectBtn">اتصال وجلب القواعد</button>
      <div class="hint">الرابط محفوظ في المتصفح بس، مش بيتشارك مع حد.</div>

      <div class="divider"></div>

      <div class="field">
        <label>قاعدة البيانات</label>
        <select id="dbSelect"></select>
      </div>

      <div class="field">
        <label>نوع الشارت</label>
        <select id="chartType">
          <option value="line">خطي (Line)</option>
          <option value="bar">أعمدة (Bar)</option>
          <option value="pie">دائري (Pie)</option>
        </select>
      </div>

      <div class="field">
        <label>المحور الأفقي / التصنيف (X)</label>
        <select id="xField"></select>
      </div>

      <div class="field">
        <label>التقسيم حسب (Series) — اختياري</label>
        <select id="seriesField"><option value="">بدون تقسيم</option></select>
      </div>

      <div class="field">
        <label>القيمة (Y)</label>
        <select id="valueField"></select>
      </div>

      <div class="field">
        <label>التجميع</label>
        <select id="aggType">
          <option value="sum">مجموع</option>
          <option value="avg">متوسط</option>
          <option value="count">عدد</option>
          <option value="last">آخر قيمة</option>
        </select>
      </div>

      <button class="primary" id="renderBtn">إغلاق اللوحة</button>
    </div>
  </div>

  <!-- المكتبة محمّلة محلياً من نفس المجلد -->
  <script src="chart.umd.js"></script>
  <script>
    const PALETTE = ["#5B8DEF", "#E8687A", "#4DBE8E", "#D4A24C", "#B98EFF", "#4DD9C0", "#F0A868", "#8A93A6"];
    let currentChart = null;
    let currentRecords = [];
    let columns = [];

    const $ = id => document.getElementById(id);
    const statusEl = $('status');
    const overlay = $('overlay');
    const settingsBtn = $('settingsBtn');

    // فتح/قفل لوحة الإعدادات
    settingsBtn.addEventListener('click', () => overlay.classList.add('open'));
    $('closeBtn').addEventListener('click', () => overlay.classList.remove('open'));
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('open'); });

    window.addEventListener('load', () => {
      const savedUrl = localStorage.getItem('notion_studio_api_url');
      if (savedUrl) {
        $('apiUrl').value = savedUrl;
        connect(true); // اتصال صامت، بدون فتح اللوحة
      } else {
        // أول مرة: افتح اللوحة تلقائياً عشان يدخل الإعدادات
        overlay.classList.add('open');
        setStatus('من فضلك اضبط الإعدادات من الأيقونة أعلى يمين الصفحة');
      }
    });

    $('connectBtn').addEventListener('click', () => connect(false));
    $('dbSelect').addEventListener('change', onDatabaseChange);

    // أي تغيير في الإعدادات يحدّث الشارت فوراً بدون الحاجة لزر
    ['chartType', 'xField', 'seriesField', 'valueField', 'aggType'].forEach(id => {
      $(id).addEventListener('change', () => {
        if (!columns.length) return;
        saveConfig();
        renderChart();
      });
    });

    // الزر بقى بس لإغلاق اللوحة (الشارت بيتحدث لحظياً أصلاً)
    $('renderBtn').addEventListener('click', () => {
      saveConfig();
      renderChart();
      overlay.classList.remove('open');
    });

    async function connect(silent) {
      const apiUrl = $('apiUrl').value.trim();
      if (!apiUrl) { if (!silent) setStatus('من فضلك أدخل رابط الـ Web App'); return; }
      localStorage.setItem('notion_studio_api_url', apiUrl);

      if (!silent) setStatus('جاري جلب قواعد البيانات...');
      try {
        const res = await fetch(apiUrl + '?action=list_databases');
        const dbs = await res.json();
        if (dbs.error) throw new Error(JSON.stringify(dbs.error));
        if (!Array.isArray(dbs) || dbs.length === 0) {
          throw new Error('لا توجد قواعد بيانات موصولة. اربط الـ integration بالـ database من Notion.');
        }

        $('dbSelect').innerHTML = dbs.map(d => `<option value="${d.id}">${d.title}</option>`).join('');

        const savedDbId = localStorage.getItem('notion_studio_last_db');
        if (savedDbId && dbs.some(d => d.id === savedDbId)) {
          $('dbSelect').value = savedDbId;
        }
        await onDatabaseChange(silent);
      } catch (err) {
        setStatus('خطأ: ' + err.message);
        overlay.classList.add('open');
      }
    }

    async function onDatabaseChange(silent) {
      const apiUrl = $('apiUrl').value.trim();
      const dbId = $('dbSelect').value;
      if (!dbId) return;

      if (!silent) setStatus('جاري تحميل البيانات...');
      try {
        const res = await fetch(apiUrl + '?action=get_data&database_id=' + encodeURIComponent(dbId));
        const records = await res.json();
        if (records.error) throw new Error(JSON.stringify(records.error));
        if (!Array.isArray(records) || records.length === 0) {
          throw new Error('لا توجد صفوف في هذه القاعدة.');
        }

        currentRecords = records;
        columns = Object.keys(records[0]);

        const opts = columns.map(c => `<option value="${c}">${c}</option>`).join('');
        $('xField').innerHTML = opts;
        $('valueField').innerHTML = opts;
        $('seriesField').innerHTML = '<option value="">بدون تقسيم</option>' + opts;

        const saved = JSON.parse(localStorage.getItem('notion_studio_config_' + dbId) || 'null');
        if (saved) {
          $('xField').value = saved.xField || columns[0];
          $('seriesField').value = saved.seriesField || '';
          $('valueField').value = saved.valueField || columns[0];
          $('chartType').value = saved.chartType || 'line';
          $('aggType').value = saved.aggType || 'sum';
          renderChart();
        } else if (!silent) {
          setStatus('اختر الأعمدة واضغط "حفظ وعرض الشارت"');
        }
      } catch (err) {
        setStatus('خطأ: ' + err.message);
        overlay.classList.add('open');
      }
    }

    function saveConfig() {
      const dbId = $('dbSelect').value;
      localStorage.setItem('notion_studio_last_db', dbId);
      localStorage.setItem('notion_studio_config_' + dbId, JSON.stringify({
        xField: $('xField').value,
        seriesField: $('seriesField').value,
        valueField: $('valueField').value,
        chartType: $('chartType').value,
        aggType: $('aggType').value
      }));
    }

    function aggregate(values, type) {
      const nums = values.map(v => Number(v)).filter(v => !isNaN(v));
      if (type === 'count') return values.length;
      if (nums.length === 0) return 0;
      if (type === 'sum') return nums.reduce((a, b) => a + b, 0);
      if (type === 'avg') return nums.reduce((a, b) => a + b, 0) / nums.length;
      if (type === 'last') return nums[nums.length - 1];
      return nums.reduce((a, b) => a + b, 0);
    }

    function renderChart() {
      const xField = $('xField').value;
      const seriesField = $('seriesField').value;
      const valueField = $('valueField').value;
      const chartType = $('chartType').value;
      const aggType = $('aggType').value;

      if (!xField || !valueField) { setStatus('اختر أعمدة X و Y أولاً'); return; }

      try {
        let chartConfig;

        if (chartType === 'pie') {
          const groupKey = seriesField || xField;
          const groups = {};
          currentRecords.forEach(r => {
            const key = String(r[groupKey] ?? '');
            if (!groups[key]) groups[key] = [];
            groups[key].push(r[valueField]);
          });
          const labels = Object.keys(groups);
          const data = labels.map(l => aggregate(groups[l], aggType));

          chartConfig = {
            type: 'pie',
            data: {
              labels,
              datasets: [{ data, backgroundColor: labels.map((_, i) => PALETTE[i % PALETTE.length]) }]
            },
            options: {
              responsive: true, maintainAspectRatio: false,
              plugins: { legend: { labels: { color: '#E7E9EE' } } }
            }
          };
        } else {
          const xValues = [...new Set(currentRecords.map(r => r[xField]))]
            .sort((a, b) => (new Date(a) - new Date(b)) || String(a).localeCompare(String(b)));

          let datasets = [];

          if (seriesField) {
            const seriesNames = [...new Set(currentRecords.map(r => r[seriesField]))];
            datasets = seriesNames.map((s, i) => {
              const color = PALETTE[i % PALETTE.length];
              const data = xValues.map(x => {
                const matching = currentRecords.filter(r => r[xField] === x && r[seriesField] === s).map(r => r[valueField]);
                return matching.length ? aggregate(matching, aggType) : null;
              });
              return {
                label: String(s), data, borderColor: color, backgroundColor: color,
                spanGaps: true, tension: 0.3, borderWidth: 2, pointRadius: 3
              };
            });
          } else {
            const data = xValues.map(x => {
              const matching = currentRecords.filter(r => r[xField] === x).map(r => r[valueField]);
              return matching.length ? aggregate(matching, aggType) : null;
            });
            datasets = [{
              label: valueField, data, borderColor: PALETTE[0], backgroundColor: PALETTE[0],
              spanGaps: true, tension: 0.3, borderWidth: 2, pointRadius: 3
            }];
          }

          chartConfig = {
            type: chartType,
            data: { labels: xValues.map(x => String(x)), datasets },
            options: {
              responsive: true, maintainAspectRatio: false,
              interaction: { mode: 'index', intersect: false },
              plugins: {
                legend: { labels: { color: '#E7E9EE' } },
                tooltip: { backgroundColor: '#12151C', borderColor: '#1F2430', borderWidth: 1, titleColor: '#E7E9EE', bodyColor: '#E7E9EE', padding: 10 }
              },
              scales: {
                x: { grid: { color: '#1F2430' }, ticks: { color: '#7A8091' } },
                y: { grid: { color: '#1F2430' }, ticks: { color: '#7A8091' } }
              }
            }
          };
        }

        if (currentChart) currentChart.destroy();
        currentChart = new Chart($('chartCanvas'), chartConfig);
        statusEl.style.display = 'none';
      } catch (err) {
        setStatus('خطأ في رسم الشارت: ' + err.message);
      }
    }

    function setStatus(msg) {
      statusEl.style.display = 'flex';
      statusEl.textContent = msg;
    }
  </script>
</body>
</html>
